<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
        <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png" />
        <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>XIV Macro Generator</title>
    </head>
    <body>
        <div id="app">
            <form method="get" onsubmit="return false;" id="frmMacroForm">
                <h1 class="text-2xl font-bold">Macro Generator</h1>
                <div class="grid md:grid-cols-2 gap-2">
                    <div class="text-left">
                        <h2 class="font-bold">Text Template</h2>
                        <textarea class="block w-full border border-border p-1" id="txtTemplate">
Hunt Train starting at &lt;flag&gt;</textarea
                        >
                        <h2 class="font-bold">Special Characters</h2>
                        <div class="text-xs">
                            Click any character to insert it at the active position in the text box above.
                        </div>
                        <div id="customIconsBlock"></div>

                        <h2 class="font-bold mt-4">Select Chat Channels</h2>
                        <div class="grid grid-cols-3 gap-x-1">
                            <div>
                                <div class="border-b">
                                    Local
                                    <span class="text-sm">[<a href="#" onclick="toggleLocal()">Toggle all</a>]</span>
                                </div>
                                <ul>
                                    <li>
                                        <label>
                                            <input type="checkbox" name="outputs" value="l1" data-local="1" />
                                            LS1
                                        </label>
                                    </li>
                                    <li>
                                        <label>
                                            <input type="checkbox" name="outputs" value="l2" data-local="1" />
                                            LS2
                                        </label>
                                    </li>
                                    <li>
                                        <label>
                                            <input type="checkbox" name="outputs" value="l3" data-local="1" />
                                            LS3
                                        </label>
                                    </li>
                                    <li>
                                        <label>
                                            <input type="checkbox" name="outputs" value="l4" data-local="1" />
                                            LS4
                                        </label>
                                    </li>
                                    <li>
                                        <label>
                                            <input type="checkbox" name="outputs" value="l5" data-local="1" />
                                            LS5
                                        </label>
                                    </li>
                                    <li>
                                        <label>
                                            <input type="checkbox" name="outputs" value="l6" data-local="1" />
                                            LS6
                                        </label>
                                    </li>
                                    <li>
                                        <label>
                                            <input type="checkbox" name="outputs" value="l7" data-local="1" />
                                            LS7
                                        </label>
                                    </li>
                                    <li>
                                        <label>
                                            <input type="checkbox" name="outputs" value="l8" data-local="1" />
                                            LS8
                                        </label>
                                    </li>
                                </ul>
                            </div>
                            <div>
                                <div class="border-b">
                                    Crossworld
                                    <span class="text-sm"
                                        >[<a href="#" onclick="toggleCrossworld()">Toggle all</a>]</span
                                    >
                                </div>
                                <ul>
                                    <li>
                                        <label>
                                            <input type="checkbox" name="outputs" value="cwl1" data-cw="1" />
                                            CWLS1
                                        </label>
                                    </li>
                                    <li>
                                        <label>
                                            <input type="checkbox" name="outputs" value="cwl2" data-cw="1" />
                                            CWLS2
                                        </label>
                                    </li>
                                    <li>
                                        <label>
                                            <input type="checkbox" name="outputs" value="cwl3" data-cw="1" />
                                            CWLS3
                                        </label>
                                    </li>
                                    <li>
                                        <label>
                                            <input type="checkbox" name="outputs" value="cwl4" data-cw="1" />
                                            CWLS4
                                        </label>
                                    </li>
                                    <li>
                                        <label>
                                            <input type="checkbox" name="outputs" value="cwl5" data-cw="1" />
                                            CWLS5
                                        </label>
                                    </li>
                                    <li>
                                        <label>
                                            <input type="checkbox" name="outputs" value="cwl6" data-cw="1" />
                                            CWLS6
                                        </label>
                                    </li>
                                    <li>
                                        <label>
                                            <input type="checkbox" name="outputs" value="cwl7" data-cw="1" />
                                            CWLS7
                                        </label>
                                    </li>
                                    <li>
                                        <label>
                                            <input type="checkbox" name="outputs" value="cwl8" data-cw="1" />
                                            CWLS8
                                        </label>
                                    </li>
                                </ul>
                            </div>
                            <div>
                                <div class="border-b">
                                    Other
                                    <span class="text-sm">[<a href="#" onclick="toggleMisc()">Toggle all</a>]</span>
                                </div>
                                <ul>
                                    <li>
                                        <label>
                                            <input type="checkbox" name="outputs" value="s" data-misc="1" />
                                            Say
                                        </label>
                                    </li>
                                    <li>
                                        <label>
                                            <input type="checkbox" name="outputs" value="y" data-misc="1" />
                                            Yell
                                        </label>
                                    </li>
                                    <li>
                                        <label>
                                            <input type="checkbox" name="outputs" value="s" data-misc="1" />
                                            Shout
                                        </label>
                                    </li>
                                    <li>
                                        <label>
                                            <input type="checkbox" name="outputs" value="p" data-misc="1" />
                                            Party
                                        </label>
                                    </li>
                                    <li>
                                        <label>
                                            <input type="checkbox" name="outputs" value="fc" data-misc="1" />
                                            Free Company
                                        </label>
                                    </li>
                                    <li>
                                        <label>
                                            <input type="checkbox" name="outputs" value="n" data-misc="1" />
                                            Novice Network
                                        </label>
                                    </li>
                                    <li>
                                        <label>
                                            <input type="checkbox" name="outputs" value="e" data-misc="1" />
                                            Echo log
                                        </label>
                                    </li>
                                </ul>
                            </div>
                        </div>

                        <button class="border p-1 rounded-sm mt-4 bg-code-bg">Generate</button>
                    </div>
                    <div>
                        <h2 class="font-bold">Output</h2>
                        <textarea class="w-full border border-border p-1" id="txtOutput"></textarea>
                        <div
                            class="p-1 border mt-4 text-sm hidden border-warning text-warning items-center"
                            id="lineLimitWarning"
                        >
                            <svg
                                xmlns="http://www.w3.org/2000/svg"
                                width="24"
                                height="24"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                class="lucide lucide-triangle-alert-icon lucide-triangle-alert"
                            >
                                <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3" />
                                <path d="M12 9v4" />
                                <path d="M12 17h.01" />
                            </svg>
                            <div>Warning! This macro is over 15 lines long and will be truncated in game.</div>
                        </div>
                        <button type="button" class="mt-4 bg-code-bg border rounded-md p-1" id="btnCopy">Copy</button>
                    </div>
                </div>
            </form>
        </div>
        <script type="module" src="/src/main.ts"></script>
        <script lang="text/javascript">
            toggleLocal = () => {
                const p = document.querySelectorAll('[data-local="1"]')
                let newState = true
                if(p[0].checked == true) {
                    newState = false
                }
                p.forEach((el) => {
                    el.checked = newState
                    el.dispatchEvent(new Event('change', {bubbles: true}))
                })
            }

            toggleCrossworld = () => {
                const p = document.querySelectorAll('[data-cw="1"]')
                let newState = true
                if(p[0].checked == true) {
                    newState = false
                }
                p.forEach((el) => {
                    el.checked = newState
                    el.dispatchEvent(new Event('change', {bubbles: true}))
                })
            }

            toggleMisc = () => {
                const p = document.querySelectorAll('[data-misc="1"]')
                let newState = true
                if(p[0].checked == true) {
                    newState = false
                }
                p.forEach((el) => {
                    el.checked = newState
                    el.dispatchEvent(new Event('change', {bubbles: true}))
                })
            }
        </script>
    </body>
</html>
